<!DOCTYPE html>
<html>
<head>
<title>People</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>People Details</h1>

<label>Adults:</label><br><br>
<input id="adults" type="number" min="1" value="1">

<br><br>

<label>Children:</label><br><br>
<input id="children" type="number" min="0" value="0">

<br><br><br>

<button onclick="analyzeTrip()">Analyze</button>

</div>

<script>
function analyzeTrip() {
    let adults = document.getElementById("adults").value;
    let children = document.getElementById("children").value;

    localStorage.setItem("adults", adults);
    localStorage.setItem("children", children);

    window.location.href = "result.html";
}
</script>

</body>
</html>
