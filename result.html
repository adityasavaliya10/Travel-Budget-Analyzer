function createCity(hotel, travel, food) {

return {

budget: {
hotel: hotel,
travel: travel,
food: food,
shopping: Math.round(food * 0.5),
entertainment: Math.round(food * 0.3),
localTransport: Math.round(travel * 0.4),
miscellaneous: 100
},

moderate: {
hotel: Math.round(hotel * 1.4),
travel: Math.round(travel * 2),
food: Math.round(food * 1.8),
shopping: Math.round(food * 1.0),
entertainment: Math.round(food * 0.6),
localTransport: Math.round(travel * 0.8),
miscellaneous: 150
},

luxury: {
hotel: Math.round(hotel * 2),
travel: Math.round(travel * 3.5),
food: Math.round(food * 2),
shopping: Math.round(food * 2),
entertainment: Math.round(food * 1.2),
localTransport: Math.round(travel * 1.5),
miscellaneous: 250
}

};

}

//////////////////////////////////////////////////
// CALCULATION
//////////////////////////////////////////////////

function calculateTrip() {

let city = localStorage.getItem("city");
let style = localStorage.getItem("style");
let days = parseInt(localStorage.getItem("days")) || 1;
let adults = parseInt(localStorage.getItem("adults")) || 1;
let children = parseInt(localStorage.getItem("children")) || 0;

if (!cityCosts[city]) {
alert("City not found");
window.location.href = "index.html";
return;
}

let costs = cityCosts[city][style];

document.getElementById("hotel").innerText = costs.hotel;
document.getElementById("travel").innerText = costs.travel;
document.getElementById("food").innerText = costs.food;
document.getElementById("shopping").innerText = costs.shopping;
document.getElementById("entertainment").innerText = costs.entertainment;
document.getElementById("localTransport").innerText = costs.localTransport;
document.getElementById("miscellaneous").innerText = costs.miscellaneous;

let dailyTotal =
costs.hotel +
costs.travel +
costs.food +
costs.shopping +
costs.entertainment +
costs.localTransport +
costs.miscellaneous;

let people = adults + children;
let totalTripCost = dailyTotal * days * people;

document.getElementById("dailyTotal").innerText = "₹ " + dailyTotal;
document.getElementById("tripTotal").innerText = "₹ " + totalTripCost;

}

function startNewTrip() {
localStorage.clear();
window.location.href = "index.html";
}

calculateTrip();
